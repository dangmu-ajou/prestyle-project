tracker_type: ocsort

track_high_thresh: 0.5      # 높은 신뢰도 탐지 임계값
track_low_thresh: 0.1       # 낮은 신뢰도 탐지 임계값 (2단계 매칭)
new_track_thresh: 0.5       # 새 트랙 생성 임계값

track_buffer: 30            # 사라진 후 ID 유지 프레임 수

match_thresh: 0.8           # IoU 기반 매칭 임계값

min_box_area: 10            # 최소 박스 면적 (노이즈 제거)

use_byte: False             # ByteTrack 2단계 매칭 사용 여부 (False = OC-SORT 순수 방식)
